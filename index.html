<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI I Ching Prompt Generator | 數位易經算卦器</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <!-- 運用 span 強制手機端完美斷句與換行 -->
            <h1>
                <span>☯️ 易經 AI</span>
                <span>占卜聖殿</span>
            </h1>
            <p class="subtitle">
                <span>揲蓍布卦，感格神明。</span>
                <span>一鍵生成大語言模型深度解卦 Prompt</span>
            </p>
        </header>

        <!-- 一、問題輸入區 -->
        <section class="card input-section">
            <h2>一、注入所求之事</h2>
            <div class="form-group">
                <label for="question">請在下方誠心輸入你心中所求之疑問：</label>
                <textarea id="question" rows="4" placeholder="心誠則靈，請輸入具體問題...（例如工作抉擇、感情走向、面試結果）" autocomplete="off"></textarea>
            </div>
            
            <!-- 互動式搖骰子區域 -->
            <div class="divine-container">
                <p class="hint">【擲骰子】</p>
                <p class="hint-sub">搖之前請在心中默念 1 次問題</p>
                <p class="hint-desc">（用手指按住法器來回拖曳）</p>
                
                <p class="hint-or">或</p>
                
                <!-- 允許手機搖晃感應按鈕 (iOS 專用，預設隱藏) -->
                <button id="motion-btn" class="btn-motion hidden">點擊允許手機搖晃感應</button>

                <!-- 法器主體 -->
                <div id="dice-cup" class="dice-cup">
                    <div class="cup-body">🏮</div>
                    <div class="dice-container">
                        <div class="die">⚀</div>
                        <div class="die">⚂</div>
                        <div class="die">⚄</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 二、結果顯示區 -->
        <section id="result-section" class="card result-section hidden">
            <h2>二、啟卦天機</h2>
            
            <div class="result-grid">
                <div class="info-panel">
                    <p><strong>上卦：</strong><span id="res-upper"></span></p>
                    <p><strong>下卦：</strong><span id="res-lower"></span></p>
                    <p><strong>動爻：</strong><span id="res-moving"></span></p>
                    <div class="hexagram-names">
                        <p><strong>本卦：</strong><span id="hex-main" class="badge"></span></p>
                        <p><strong>變卦：</strong><span id="hex-changed" class="badge bg-change"></span></p>
                        <p><strong>互卦：</strong><span id="hex-mutual" class="badge bg-info"></span></p>
                        <p><strong>錯卦：</strong><span id="hex-opposite" class="badge bg-info"></span></p>
                        <p><strong>綜卦：</strong><span id="hex-reversed" class="badge bg-info"></span></p>
                    </div>
                </div>
                
                <div class="visual-panel">
                    <h3>本卦聖象圖</h3>
                    <div id="hexagram-diagram" class="diagram"></div>
                </div>
            </div>

            <div class="line-text-box">
                <h4>動爻爻辭指引</h4>
                <p id="res-line-text">正在讀取爻辭...</p>
            </div>
        </section>

        <!-- 三、Prompt 生成區 -->
        <section id="prompt-section" class="card prompt-section hidden">
            <h2>三、AI 解卦 Prompt 產生器</h2>
            <p class="tip">下方經文已整合您的卦象，複製後即可貼至大語言模型進行深度解析。</p>
            
            <textarea id="prompt-content" readonly rows="12"></textarea>
            
            <div class="action-buttons">
                <button id="copy-btn" class="btn btn-success">📋 複製完整 Prompt</button>
            </div>

            <div class="ai-links">
                <p>快速前往 AI 平台：</p>
                <div class="ai-grid">
                    <a href="https://chatgpt.com/" target="_blank" class="ai-btn chatgpt">Open ChatGPT</a>
                    <a href="https://claude.ai/" target="_blank" class="ai-btn claude">Open Claude</a>
                    <a href="https://gemini.google.com/" target="_blank" class="ai-btn gemini">Open Gemini</a>
                </div>
            </div>
        </section>
    </div>

    <div id="toast" class="toast">複製成功！</div>

    <script src="script.js"></script>
</body>
</html>
